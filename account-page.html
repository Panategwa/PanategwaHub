<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Panategwa Hub - Account</title>

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <script src="menu-loader.js" defer></script>

  <script src="settings/settings.js" defer></script>

  <script type="module" src="auth/account.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

        <script src="auth/firebase-config.js"></script>
        <script src="auth/auth.js"></script>
  <style>
    .account-wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(6px);
      margin-bottom: 16px;
    }

    .field-row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button-row button {
      margin: 0;
    }

    .danger {
      background: rgba(180, 40, 40, 0.85);
      color: white;
    }

    .status {
      margin: 10px 0 16px;
      font-weight: 700;
      opacity: 0.9;
    }

    .status[data-kind="error"] { color: #ffb3b3; }
    .status[data-kind="success"] { color: #b6ffcb; }
    .status[data-kind="info"] { color: inherit; }

    @media (min-width: 900px) {
      .account-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
      }
    }
  </style>
</head>

<body>
  <div id="menu-container"></div>

  <div class="account-wrap">
    <h1>👤 Account</h1>

    <p id="auth-status" class="status" data-kind="info">Loading account...</p>

    <div class="account-grid">
      <section class="card">
        <h2>Sign in</h2>

        <div class="button-row">
          <button id="google-login-btn" type="button">Continue with Google</button>
          <button id="logout-btn" type="button" style="display:none;">Logout</button>
        </div>

        <p style="margin-top: 12px; opacity: 0.8;">
          Google login uses Firebase Auth popup sign-in.
        </p>
      </section>

      <section class="card">
        <h2>Your info</h2>

        <div id="user-info">
          <p><b>Status:</b> Not logged in</p>
          <p><b>Name:</b> —</p>
          <p><b>Email:</b> —</p>
          <p><b>Verified:</b> —</p>
          <p><b>Provider:</b> —</p>
          <p><b>Account ID:</b> —</p>
          <p><b>Achievements:</b> Coming soon</p>
          <p><b>Rank:</b> Explorer</p>
        </div>
      </section>
    </div>

    <section class="card">
      <h2>Danger zone</h2>
      <p style="margin-top: 0;">
        Deleting an account may require a fresh Google sign-in first.
      </p>
      <button id="delete-account-btn" class="danger" type="button" style="display:none;">Delete account</button>
    </section>
  </div>
</body>
</html>
