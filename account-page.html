<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="menu-loader.js" defer></script>

  <script src="settings/text-size.js" defer></script>
  <script src="settings/color-theme.js" defer></script>
  <script src="settings/translate.js" defer></script>
  <script src="settings/settings.js" defer></script>
  
  <!-- Firebase MUST be module -->
<script type="module" src="auth/firebase-config.js"></script>
<script defer src="auth/auth.js"></script>
</head>

<body>
  <div id="menu-container"></div><br>
  <h1>👤 Account</h1>

  <div class="card">

    <div id="auth-status">Not logged in</div>

    <div id="user-info"></div>

    <hr>

    <input id="username" placeholder="Username" />
    <button id="save-username-btn">Save Username</button>

    <hr>

    <button id="google-login-btn">Continue with Google</button>
    <button id="logout-btn">Logout</button>

    <hr>

    <button id="delete-account-btn" style="background:red;color:white;">
      Delete Account
    </button>

  </div>

</body>
</html>
