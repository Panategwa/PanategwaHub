<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Panategwa d Maps</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="menu-loader.js" defer></script>

<style>

/* Ethnotype locations */

.pitosians{
  top:22%;
  left:37%;
}

.rashooties{
  top:30%;
  left:5%;
}

.mazunians{
  top:55%;
  left:10%;
}

.foozeens{
  top:68%;
  left:15%;
}

.jamuhairies{
  top:50%;
  left:28.5%;
}

.arifalums{
  top:74%;
  right:47%;
}

.amronians{
  top:80%;
  right:5%;
}

</style>
</head>

<body>

<div id="menu-container"></div>

<h1 style="margin-top:40px;">Map views of Panategwa d</h1>

<div class="navbar">
<button onclick="showMap('panategwa-d-map.jpg')">Map</button>
<button onclick="showMap('panategwa-d-tectonic-plates-map.jpg')">Tectonic Plates</button>
<button onclick="showMap('panategwa-d-tectonic-plates-movement-map.jpg')">Plate Movement</button>
</div>

<div class="container">

<img id="map-image" src="panategwa-d-map.jpg" alt="Map of Panategwa d">

<!-- Ethnotype buttons -->
<a class="ethnotype pitosians" data-ethnotype="Pitosians" href="panategwa-d-life-page.html?ethnotype=Pitosians">Pitosians</a>
<a class="ethnotype rashooties" data-ethnotype="Rashooties" href="panategwa-d-life-page.html?ethnotype=Rashooties">Rashooties</a>
<a class="ethnotype mazunians" data-ethnotype="Mazunians" href="panategwa-d-life-page.html?ethnotype=Mazunians">Mazunians</a>
<a class="ethnotype jamuhairies" data-ethnotype="Jamuhairies" href="panategwa-d-life-page.html?ethnotype=Jamuhairies">Jamuhairies</a>
<a class="ethnotype arifalums" data-ethnotype="Arifalums" href="panategwa-d-life-page.html?ethnotype=Arifalums">Arifalums</a>
<a class="ethnotype foozeens" data-ethnotype="Foozeens" href="panategwa-d-life-page.html?ethnotype=Foozeens">Foozeens</a>
<a class="ethnotype amronians" data-ethnotype="Amronians" href="panategwa-d-life-page.html?ethnotype=Amronians">Amronians</a>
</div>

<script>
function showMap(filename){
  document.getElementById("map-image").src = filename;
}

// Optional: intercept clicks and send to JS function if you want dynamic behavior
document.querySelectorAll(".ethnotype").forEach(el => {
  el.addEventListener("click", e => {
    // prevent default page reload
    e.preventDefault();
    const ethnotype = el.dataset.ethnotype;
    if (ethnotype) {
      // send to taxonomy page dynamically
      // Example: if your taxonomy page JS listens to URL params
      window.location.href = `panategwa-d-life-page.html?ethnotype=${ethnotype}`;
    }
  });
});
</script>

</body>
</html>
