<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Panategwa Hub - Settings</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="menu-loader.js" defer></script>
  <script src="settings.js" defer></script>
</head>

<body>
<div id="menu-container"></div>

<h1> Settings </h1>

<section class="settings-box">

  <div class="settings-main-container">

    <div class="settings-group">
      <button class="settings-main" onclick="toggleLanguages()">
        🌍 Language
      </button>

      <div id="lang-message" style="display:none;">
        Select your preferred language.<br>
        (Changes take effect after a few seconds)
      </div>

      <div id="lang-buttons" class="settings-options" style="display:none;"></div>
    </div>

    <div class="settings-group">
      <button class="settings-main" onclick="toggleTextSizes()">
        Text Size
      </button>

      <div id="textsize-message" style="display:none;">
        Choose your preferred text size.
      </div>

      
      <div id="textsize-buttons" class="settings-options" style="display:none;">
        <button onclick="setTextSize('small')">Small</button>
        <button onclick="setTextSize('medium')">Medium</button>
        <button onclick="setTextSize('large')">Large</button>
      </div>
    </div>

    <div class="settings-group">
  <button class="settings-main" onclick="toggleThemes()">
    Color Theme
  </button>

  <div id="theme-message" style="display:none;">
    Choose a visual preset for the site.
  </div>

  <div id="theme-buttons" class="settings-options" style="display:none;"></div>
</div>

  </div>

</section>


</body>
</html>
