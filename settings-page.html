<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Panategwa Hub - Settings</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="menu-loader.js" defer></script>
  <script src="settings.js" defer></script>
</head>

<body>

<div id="menu-container"></div>

<h1>Settings</h1>
<br><br>
<section class="settings-box">
  <button onclick="toggleLanguages()">
    🌍 Language 
  </button>
    <div id="lang-message" style="display: none; margin: 10px 0; padding: 10px; color: rgba(255, 255, 255, 0.75);">
     Select your preferred language. <br>
    (Changes take effect after a few seconds during each page load).
  </div>
  <div id="lang-buttons"></div>

<button onclick="toggleTextSize()">
  Text Size
</button>

<div id="textsize-buttons" style="display: none; margin-top: 10px;">
  <button onclick="setTextSize('small')">Small</button>
  <button onclick="setTextSize('medium')">Medium</button>
  <button onclick="setTextSize('large')">Large</button>
</div>
</section>

</body>
</html>
