<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Panategwa Hub - Streak</title>

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />

  <script src="menu-loader.js" defer></script>
  <script src="settings/text-size.js" defer></script>
  <script src="settings/color-theme.js" defer></script>
  <script src="settings/translate.js" defer></script>
  <script src="settings/settings.js" defer></script>

  <script type="module" src="auth/streak.js"></script>

  <style>
    .streak-wrap {
      max-width: 1120px;
      margin: 0 auto;
    }

    .streak-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    }

    .streak-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .streak-head h1 {
      margin: 0 0 6px;
    }

    .streak-head p {
      margin: 0;
      opacity: 0.82;
    }

    .streak-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .setting-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .setting-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .setting-desc {
      opacity: 0.82;
      line-height: 1.4;
    }

    .streak-week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .streak-day {
      padding: 10px 8px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      display: grid;
      gap: 4px;
    }

    .streak-day.done {
      background: rgba(175,200,75,0.16);
      border-color: rgba(175,200,75,0.22);
    }

    .streak-day-label {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .streak-day-xp {
      font-weight: 700;
      font-size: 0.92rem;
    }

    @media (max-width: 900px) {
      .streak-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .streak-week {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="menu-container"></div>

  <div class="streak-wrap">
    <div id="streak-root"></div>
  </div>
</body>
</html>
